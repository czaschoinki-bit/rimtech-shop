<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Zamówienie - Rimtech Dynamics</title>
  <meta name="description" content="Finalizacja zamówienia w sklepie Rimtech Dynamics." />

  <link rel="stylesheet" href="/style.css" />

  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }

    .checkout-form {
      display: grid;
      gap: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .form-field {
      display: grid;
      gap: 7px;
    }

    .form-field label {
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-field input,
    .form-field textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 13px;
      border: 1px solid var(--border-dark);
      border-radius: 4px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
    }

    .form-field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .checkbox-field {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
    }

    .checkbox-field input {
      margin-top: 4px;
    }

    .checkout-summary {
      position: sticky;
      top: 108px;
    }

    .checkout-items {
      display: grid;
      gap: 12px;
      margin: 18px 0;
    }

    .checkout-item {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: center;
    }

    .checkout-item img,
    .checkout-item-placeholder {
      width: 64px;
      height: 56px;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f0f1f2;
    }

    .checkout-item strong {
      display: block;
      font-size: 14px;
      line-height: 1.25;
    }

    .checkout-item span {
      color: var(--muted);
      font-size: 13px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0;
      color: var(--text-soft);
      font-size: 15px;
    }

    .summary-total {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-size: 22px;
      font-weight: 850;
    }

    .checkout-empty {
      padding: 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }

      .checkout-summary {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <img
          src="/images/logo-rtd.png"
          alt="RTD Rimtech Dynamics"
          class="site-logo"
        />

        <div class="logo-text">
          <strong>Rimtech</strong>
          <span>Dynamics</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Strona główna</a>
        <a href="/#produkty">Produkty</a>
        <a href="/o-nas.html">O nas</a>
        <a href="/faq.html">FAQ</a>
        <a href="/blog.html">Blog</a>
        <a href="/#kontakt">Kontakt</a>
        <a href="/cart.html" class="cart-link">Koszyk (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-header">
        <div>
          <div class="section-kicker">Rimtech Dynamics</div>
          <h1>Zamówienie</h1>
        </div>
      </div>

      <div id="checkout-content">
        <p>Ładowanie zamówienia...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      Rimtech Dynamics © 2026
    </div>

    <div class="footer-links">
      <a href="/legal.html?doc=regulamin">Regulamin</a>
      <a href="/legal.html?doc=polityka-prywatnosci">Polityka prywatności</a>
      <a href="/legal.html?doc=polityka-cookies">Cookies</a>
      <a href="/legal.html?doc=zwroty-reklamacje">Zwroty i reklamacje</a>
      <a href="/legal.html?doc=dostawa-platnosci">Dostawa i płatności</a>
    </div>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatPrice(price, currency = 'PLN') {
      return new Intl.NumberFormat('pl-PL', {
        style: 'currency',
        currency: currency || 'PLN'
      }).format(Number(price || 0));
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem('rimtech_cart')) || [];
      } catch (error) {
        return [];
      }
    }

    function updateCartCount() {
      const cartCount = document.getElementById('cart-count');

      if (!cartCount) {
        return;
      }

      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + Number(item.quantity || 1), 0);

      cartCount.textContent = count;
    }

    function getCartTotal(cart) {
      return cart.reduce((sum, item) => {
        return sum + Number(item.price || 0) * Number(item.quantity || 1);
      }, 0);
    }

    function renderCheckout() {
      const container = document.getElementById('checkout-content');
      const cart = getCart();

      if (!cart.length) {
        container.innerHTML = `
          <div class="checkout-empty">
            <h2>Koszyk jest pusty</h2>
            <p>Dodaj produkt do koszyka, aby złożyć zamówienie.</p>
            <a class="button" href="/#produkty">Zobacz produkty</a>
          </div>
        `;
        return;
      }

      const currency = cart[0].currency || 'PLN';
      const total = getCartTotal(cart);
      const quantity = cart.reduce((sum, item) => sum + Number(item.quantity || 1), 0);

      container.innerHTML = `
        <div class="checkout-layout">
          <form class="contact-card checkout-form" id="checkout-form">
            <h2>Dane do zamówienia</h2>

            <div class="form-grid">
              <div class="form-field">
                <label for="first-name">Imię</label>
                <input id="first-name" name="firstName" autocomplete="given-name" required>
              </div>

              <div class="form-field">
                <label for="last-name">Nazwisko</label>
                <input id="last-name" name="lastName" autocomplete="family-name" required>
              </div>
            </div>

            <div class="form-grid">
              <div class="form-field">
                <label for="email">E-mail</label>
                <input id="email" name="email" type="email" autocomplete="email" required>
              </div>

              <div class="form-field">
                <label for="phone">Telefon</label>
                <input id="phone" name="phone" type="tel" autocomplete="tel" required>
              </div>
            </div>

            <div class="form-field">
              <label for="address">Adres dostawy</label>
              <input id="address" name="address" autocomplete="street-address" required>
            </div>

            <div class="form-grid">
              <div class="form-field">
                <label for="postal-code">Kod pocztowy</label>
                <input id="postal-code" name="postalCode" autocomplete="postal-code" required>
              </div>

              <div class="form-field">
                <label for="city">Miasto</label>
                <input id="city" name="city" autocomplete="address-level2" required>
              </div>
            </div>

            <div class="form-field">
              <label for="notes">Uwagi do zamówienia</label>
              <textarea id="notes" name="notes" placeholder="Np. model motocykla, rocznik, kolor piast, kolor obręczy."></textarea>
            </div>

            <label class="checkbox-field">
              <input type="checkbox" name="terms" required>
              <span>
                Akceptuję regulamin sklepu oraz zasady zwrotów i reklamacji.
              </span>
            </label>

            <label class="checkbox-field">
              <input type="checkbox" name="customOrder" required>
              <span>
                Rozumiem, że zestaw kół może wymagać potwierdzenia dopasowania i konfiguracji pod konkretny motocykl.
              </span>
            </label>

            <button class="button" type="submit">
              Kupuję i płacę
            </button>

            <a class="button secondary" href="/cart.html">
              Wróć do koszyka
            </a>
          </form>

          <aside class="contact-card checkout-summary">
            <h2>Podsumowanie</h2>

            <div class="checkout-items">
              ${cart.map(item => `
                <div class="checkout-item">
                  ${
                    item.image
                      ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">`
                      : `<div class="checkout-item-placeholder"></div>`
                  }

                  <div>
                    <strong>${escapeHtml(item.title)}</strong>
                    <span>${Number(item.quantity || 1)} x ${formatPrice(item.price, item.currency)}</span>
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="summary-row">
              <span>Liczba produktów</span>
              <strong>${quantity}</strong>
            </div>

            <div class="summary-row">
              <span>Wartość produktów</span>
              <strong>${formatPrice(total, currency)}</strong>
            </div>

            <div class="summary-row">
              <span>Dostawa</span>
              <strong>Do ustalenia</strong>
            </div>

            <div class="summary-row summary-total">
              <span>Razem</span>
              <strong>${formatPrice(total, currency)}</strong>
            </div>
          </aside>
        </div>
      `;

      document.getElementById('checkout-form').addEventListener('submit', handleCheckoutSubmit);
    }

    function handleCheckoutSubmit(event) {
      event.preventDefault();

      const cart = getCart();

      if (!cart.length) {
        alert('Koszyk jest pusty.');
        return;
      }

      const formData = new FormData(event.currentTarget);

      const orderDraft = {
        customer: {
          firstName: formData.get('firstName'),
          lastName: formData.get('lastName'),
          email: formData.get('email'),
          phone: formData.get('phone'),
          address: formData.get('address'),
          postalCode: formData.get('postalCode'),
          city: formData.get('city'),
          notes: formData.get('notes')
        },
        items: cart,
        total: getCartTotal(cart),
        currency: cart[0].currency || 'PLN',
        createdAt: new Date().toISOString()
      };

      localStorage.setItem('rimtech_order_draft', JSON.stringify(orderDraft));

      alert('Dane zamówienia zapisane. Następny krok to podłączenie płatności Przelewy24.');
    }

    renderCheckout();
    updateCartCount();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
