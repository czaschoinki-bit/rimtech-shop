<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>O nas - Rimtech Dynamics</title>
  <meta name="description" content="Poznaj Rimtech Dynamics - zestawy kół do motocykli supermoto." />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <img
          src="/images/logo-rtd.png"
          alt="RTD Rimtech Dynamics"
          class="site-logo"
        />

        <div class="logo-text">
          <strong>Rimtech</strong>
          <span>Dynamics</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Strona główna</a>
        <a href="/#produkty">Produkty</a>
        <a href="/o-nas.html">O nas</a>
        <a href="/faq.html">FAQ</a>
        <a href="/blog.html">Blog</a>
        <a href="/#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div id="about-page">
        <p>Ładowanie treści...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    Rimtech Dynamics © 2026
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    async function loadAboutPage() {
      const container = document.getElementById('about-page');

      try {
        const response = await fetch('/content/about.json');
        const about = await response.json();

        document.title = about.title + ' - Rimtech Dynamics';

        const imageHtml = about.image
          ? `<img class="product-page-image" src="${about.image}" alt="${about.title}">`
          : '';

        container.innerHTML = `
          <div class="product-page">
            <div class="product-page-info">
              <div class="section-kicker">Rimtech Dynamics</div>
              <h1>${about.title}</h1>
              <p class="product-page-short">${about.intro}</p>
            </div>

            <div class="product-page-gallery">
              ${imageHtml || '<div class="product-page-image"></div>'}
            </div>
          </div>

          <div class="product-page-extra">
            <div class="contact-card">
              <h2>O marce</h2>
              <p>${about.content.replace(/\n/g, '<br>')}</p>
            </div>

            <div class="contact-card">
              <h2>Dobór zestawu</h2>
              <p>
                Przy kołach supermoto najważniejsze jest dopasowanie do konkretnego motocykla.
                Przed zakupem warto potwierdzić model, rocznik i oczekiwaną konfigurację.
              </p>
              <a class="button" href="/#kontakt">Skontaktuj się</a>
            </div>
          </div>
        `;
      } catch (error) {
        console.error('Nie udało się załadować strony O nas:', error);
        container.innerHTML = `
          <div class="contact-card">
            <h2>Błąd ładowania</h2>
            <p>Nie udało się załadować treści strony.</p>
          </div>
        `;
      }
    }

    loadAboutPage();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
