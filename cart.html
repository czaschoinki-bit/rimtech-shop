<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Koszyk - Rimtech Dynamics</title>
  <meta name="description" content="Koszyk sklepu Rimtech Dynamics." />

  <link rel="stylesheet" href="/style.css" />

  <style>
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      align-items: start;
    }

    .cart-items {
      display: grid;
      gap: 16px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 20px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(10, 14, 18, 0.045);
    }

    .cart-item img,
    .cart-item-image-placeholder {
      width: 130px;
      height: 110px;
      object-fit: cover;
      background: #f0f1f2;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .cart-item h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    .cart-item-price {
      color: var(--accent);
      font-size: 20px;
      font-weight: 850;
    }

    .cart-item-controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .quantity-button {
      width: 38px;
      height: 38px;
      border: 1px solid var(--border-dark);
      border-radius: 4px;
      background: #ffffff;
      color: var(--text);
      font-size: 18px;
      font-weight: 850;
      cursor: pointer;
    }

    .quantity-value {
      min-width: 34px;
      text-align: center;
      font-weight: 850;
    }

    .remove-button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--border-dark);
      border-radius: 4px;
      background: #ffffff;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .remove-button:hover,
    .quantity-button:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .cart-summary {
      position: sticky;
      top: 108px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin: 12px 0;
      color: var(--text-soft);
      font-size: 15px;
    }

    .summary-total {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-size: 22px;
      font-weight: 850;
    }

    .summary-actions {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .cart-empty {
      padding: 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: center;
    }

    .cart-empty h1 {
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing: -1px;
    }

    .cart-empty p {
      color: var(--text-soft);
    }

    @media (max-width: 980px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .cart-item {
        grid-template-columns: 1fr;
      }

      .cart-item img,
      .cart-item-image-placeholder {
        width: 100%;
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <img
          src="/images/logo-rtd.png"
          alt="RTD Rimtech Dynamics"
          class="site-logo"
        />

        <div class="logo-text">
          <strong>Rimtech</strong>
          <span>Dynamics</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Strona główna</a>
        <a href="/#produkty">Produkty</a>
        <a href="/o-nas.html">O nas</a>
        <a href="/faq.html">FAQ</a>
        <a href="/blog.html">Blog</a>
        <a href="/#kontakt">Kontakt</a>
        <a href="/cart.html" class="cart-link">Koszyk (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-header">
        <div>
          <div class="section-kicker">Rimtech Dynamics</div>
          <h1>Koszyk</h1>
        </div>
      </div>

      <div id="cart-content">
        <p>Ładowanie koszyka...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      Rimtech Dynamics © 2026
    </div>

    <div class="footer-links">
      <a href="/legal.html?doc=regulamin">Regulamin</a>
      <a href="/legal.html?doc=polityka-prywatnosci">Polityka prywatności</a>
      <a href="/legal.html?doc=polityka-cookies">Cookies</a>
      <a href="/legal.html?doc=zwroty-reklamacje">Zwroty i reklamacje</a>
      <a href="/legal.html?doc=dostawa-platnosci">Dostawa i płatności</a>
    </div>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatPrice(price, currency = 'PLN') {
      return new Intl.NumberFormat('pl-PL', {
        style: 'currency',
        currency: currency || 'PLN'
      }).format(Number(price || 0));
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem('rimtech_cart')) || [];
      } catch (error) {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem('rimtech_cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function updateCartCount() {
      const cartCount = document.getElementById('cart-count');

      if (!cartCount) {
        return;
      }

      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + Number(item.quantity || 1), 0);

      cartCount.textContent = count;
    }

    function getCartTotal(cart) {
      return cart.reduce((sum, item) => {
        return sum + Number(item.price || 0) * Number(item.quantity || 1);
      }, 0);
    }

    function increaseQuantity(slug) {
      const cart = getCart();
      const item = cart.find(product => product.slug === slug);

      if (item) {
        item.quantity = Number(item.quantity || 1) + 1;
      }

      saveCart(cart);
    }

    function decreaseQuantity(slug) {
      const cart = getCart();
      const item = cart.find(product => product.slug === slug);

      if (item) {
        item.quantity = Math.max(1, Number(item.quantity || 1) - 1);
      }

      saveCart(cart);
    }

    function removeFromCart(slug) {
      const cart = getCart().filter(product => product.slug !== slug);
      saveCart(cart);
    }

    function clearCart() {
      localStorage.removeItem('rimtech_cart');
      renderCart();
      updateCartCount();
    }

    function goToCheckout() {
      const cart = getCart();

      if (!cart.length) {
        alert('Koszyk jest pusty.');
        return;
      }

      window.location.href = '/checkout.html';
    }

    function renderCart() {
      const container = document.getElementById('cart-content');
      const cart = getCart();

      if (!cart.length) {
        container.innerHTML = `
          <div class="cart-empty">
            <h1>Koszyk jest pusty</h1>
            <p>Dodaj produkt do koszyka, aby przejść dalej.</p>
            <a class="button" href="/#produkty">Zobacz produkty</a>
          </div>
        `;
        return;
      }

      const currency = cart[0].currency || 'PLN';
      const total = getCartTotal(cart);
      const quantity = cart.reduce((sum, item) => sum + Number(item.quantity || 1), 0);

      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${cart.map(item => `
              <article class="cart-item">
                ${
                  item.image
                    ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">`
                    : `<div class="cart-item-image-placeholder"></div>`
                }

                <div>
                  <h2>${escapeHtml(item.title)}</h2>
                  <div class="cart-item-price">${formatPrice(item.price, item.currency)}</div>

                  <div class="cart-item-controls">
                    <button class="quantity-button" type="button" onclick="decreaseQuantity('${escapeHtml(item.slug)}')">-</button>
                    <span class="quantity-value">${Number(item.quantity || 1)}</span>
                    <button class="quantity-button" type="button" onclick="increaseQuantity('${escapeHtml(item.slug)}')">+</button>

                    <button class="remove-button" type="button" onclick="removeFromCart('${escapeHtml(item.slug)}')">
                      Usuń
                    </button>
                  </div>
                </div>
              </article>
            `).join('')}
          </div>

          <aside class="contact-card cart-summary">
            <h2>Podsumowanie</h2>

            <div class="summary-row">
              <span>Liczba produktów</span>
              <strong>${quantity}</strong>
            </div>

            <div class="summary-row">
              <span>Wartość produktów</span>
              <strong>${formatPrice(total, currency)}</strong>
            </div>

            <div class="summary-row">
              <span>Dostawa</span>
              <strong>Do ustalenia</strong>
            </div>

            <div class="summary-row summary-total">
              <span>Razem</span>
              <strong>${formatPrice(total, currency)}</strong>
            </div>

            <div class="summary-actions">
              <button class="button" type="button" onclick="goToCheckout()">
                Przejdź do zamówienia
              </button>

              <a class="button secondary" href="/#produkty">
                Kontynuuj zakupy
              </a>

              <button class="button secondary" type="button" onclick="clearCart()">
                Wyczyść koszyk
              </button>
            </div>
          </aside>
        </div>
      `;
    }

    renderCart();
    updateCartCount();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
