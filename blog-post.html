<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Wpis blogowy - Rimtech Dynamics</title>
  <meta name="description" content="Poradnik Rimtech Dynamics dotyczący kół supermoto." />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <img
          src="/images/logo-rtd.png"
          alt="RTD Rimtech Dynamics"
          class="site-logo"
        />

        <div class="logo-text">
          <strong>Rimtech</strong>
          <span>Dynamics</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Strona główna</a>
        <a href="/#produkty">Produkty</a>
        <a href="/o-nas.html">O nas</a>
        <a href="/faq.html">FAQ</a>
        <a href="/blog.html">Blog</a>
        <a href="/#kontakt">Kontakt</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div id="blog-post">
        <p>Ładowanie wpisu...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a href="/legal.html?doc=regulamin">Regulamin</a> ·
    <a href="/legal.html?doc=polityka-prywatnosci">Polityka prywatności</a> ·
    <a href="/legal.html?doc=polityka-cookies">Cookies</a> ·
    <a href="/legal.html?doc=zwroty-reklamacje">Zwroty i reklamacje</a> ·
    <a href="/legal.html?doc=dostawa-platnosci">Dostawa i płatności</a>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    const blogPosts = [
      {
        title: "Jak dobrać koła supermoto do KTM EXC?",
        slug: "jak-dobrac-kola-supermoto-do-ktm",
        date: "2026-06-28",
        excerpt: "Krótki poradnik, na co zwrócić uwagę przy wyborze kół supermoto do motocykli KTM EXC i EXC-F.",
        image: "",
        active: true,
        content: `
          <p>Dobór kół supermoto do KTM EXC lub EXC-F wymaga sprawdzenia kilku rzeczy: rocznika motocykla, mocowania tarcz, osi, dystansów oraz tego, czy zestaw ma być gotowy do montażu.</p>

          <p>Najważniejsze elementy, które warto ustalić przed zakupem:</p>

          <ul>
            <li>model motocykla,</li>
            <li>rocznik,</li>
            <li>rodzaj zawieszenia i piast,</li>
            <li>rozmiar tarczy przedniej,</li>
            <li>zębatka,</li>
            <li>kolor piast i obręczy,</li>
            <li>czy zestaw ma zawierać opony.</li>
          </ul>

          <p>Przed zakupem najlepiej skontaktować się i potwierdzić dopasowanie zestawu do konkretnego motocykla.</p>
        `
      }
    ];

    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    function loadBlogPost() {
      const container = document.getElementById('blog-post');
      const slug = getSlugFromUrl();

      const post = blogPosts.find(item => item.slug === slug && item.active);

      if (!post) {
        container.innerHTML = `
          <div class="contact-card">
            <h2>Nie znaleziono wpisu</h2>
            <p>Ten wpis blogowy nie istnieje albo nie jest aktywny.</p>
            <a class="button" href="/blog.html">Wróć do bloga</a>
          </div>
        `;
        return;
      }

      document.title = post.title + ' - Rimtech Dynamics';

      const imageHtml = post.image
        ? `<img class="product-page-image" src="${post.image}" alt="${post.title}">`
        : `<div class="product-page-image"></div>`;

      container.innerHTML = `
        <div class="product-page">
          <div class="product-page-info">
            <div class="section-kicker">${new Date(post.date).toLocaleDateString('pl-PL')}</div>
            <h1>${post.title}</h1>
            <p class="product-page-short">${post.excerpt}</p>
          </div>

          <div class="product-page-gallery">
            ${imageHtml}
          </div>
        </div>

        <div class="product-page-extra">
          <div class="contact-card legal-document">
            ${post.content}
          </div>

          <div class="contact-card">
            <h2>Potrzebujesz pomocy?</h2>
            <p>Podaj model, rocznik motocykla i oczekiwaną konfigurację, a pomożemy dobrać odpowiedni zestaw kół.</p>
            <a class="button" href="/#kontakt">Skontaktuj się</a>
          </div>
        </div>
      `;
    }

    loadBlogPost();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
