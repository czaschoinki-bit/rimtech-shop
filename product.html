<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Produkt - Rimtech Dynamics</title>
  <meta name="description" content="Szczegóły produktu Rimtech Dynamics - koła do supermoto." />

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <img
          src="/images/logo-rtd.png"
          alt="RTD Rimtech Dynamics"
          class="site-logo"
        />

        <div class="logo-text">
          <strong>Rimtech</strong>
          <span>Dynamics</span>
        </div>
      </a>

      <nav class="nav">
        <a href="/">Strona główna</a>
        <a href="/#produkty">Produkty</a>
        <a href="/o-nas.html">O nas</a>
        <a href="/faq.html">FAQ</a>
        <a href="/blog.html">Blog</a>
        <a href="/#kontakt">Kontakt</a>
        <a href="/cart.html" class="cart-link">Koszyk (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div id="product-details">
        <p>Ładowanie produktu...</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      Rimtech Dynamics © 2026
    </div>

    <div class="footer-links">
      <a href="/legal.html?doc=regulamin">Regulamin</a>
      <a href="/legal.html?doc=polityka-prywatnosci">Polityka prywatności</a>
      <a href="/legal.html?doc=polityka-cookies">Cookies</a>
      <a href="/legal.html?doc=zwroty-reklamacje">Zwroty i reklamacje</a>
      <a href="/legal.html?doc=dostawa-platnosci">Dostawa i płatności</a>
    </div>
  </footer>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('slug');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatPrice(price, currency = 'PLN') {
      return new Intl.NumberFormat('pl-PL', {
        style: 'currency',
        currency: currency || 'PLN'
      }).format(Number(price || 0));
    }

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem('rimtech_cart')) || [];
      } catch (error) {
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem('rimtech_cart', JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cartCount = document.getElementById('cart-count');

      if (!cartCount) {
        return;
      }

      const cart = getCart();
      const count = cart.reduce((sum, item) => {
        return sum + Number(item.quantity || 1);
      }, 0);

      cartCount.textContent = count;
    }

    function addProductToCart(product) {
      const cart = getCart();
      const existingProduct = cart.find(item => item.slug === product.slug);
      const quantity = Number(product.quantity || 1);

      if (existingProduct) {
        existingProduct.quantity = Number(existingProduct.quantity || 1) + quantity;
      } else {
        cart.push({
          slug: product.slug,
          title: product.title,
          price: Number(product.price || 0),
          currency: product.currency || 'PLN',
          image: product.image || '',
          quantity: quantity
        });
      }

      saveCart(cart);
    }

    function normalizeList(list, fallbackKey) {
      if (!Array.isArray(list)) {
        return [];
      }

      return list
        .map(item => {
          if (typeof item === 'string') {
            return item;
          }

          if (item && typeof item === 'object') {
            return item[fallbackKey] || item.item || item.color || item.model || item.image || '';
          }

          return '';
        })
        .filter(Boolean);
    }

    function renderList(list, fallbackKey, className = 'compatibility') {
      const items = normalizeList(list, fallbackKey);

      if (!items.length) {
        return '';
      }

      return `
        <ul class="${className}">
          ${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
        </ul>
      `;
    }

    function renderDescription(description) {
      if (!description) {
        return '<p>Opis produktu zostanie uzupełniony wkrótce.</p>';
      }

      const paragraphs = String(description)
        .split(/\n{2,}/)
        .map(part => part.trim())
        .filter(Boolean);

      return paragraphs
        .map(part => `<p>${escapeHtml(part).replaceAll('\n', '<br>')}</p>`)
        .join('');
    }

    function renderGallery(product) {
      const images = normalizeList(product.gallery, 'image');

      if (!images.length) {
        return '';
      }

      return `
        <div class="product-page-extra">
          <div class="contact-card">
            <h2>Galeria</h2>
            <div class="product-gallery-grid">
              ${images.map(image => `
                <img src="${escapeHtml(image)}" alt="${escapeHtml(product.title)}">
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    async function loadProduct() {
      const container = document.getElementById('product-details');
      const slug = getSlugFromUrl();

      if (!slug) {
        container.innerHTML = `
          <div class="contact-card">
            <h2>Nie znaleziono produktu</h2>
            <p>Brakuje identyfikatora produktu w adresie strony.</p>
            <a class="button" href="/#produkty">Wróć do produktów</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch('/data/products.json');
        const data = await response.json();

        const product = (data.products || []).find(item => item.slug === slug && item.active);

        if (!product) {
          container.innerHTML = `
            <div class="contact-card">
              <h2>Nie znaleziono produktu</h2>
              <p>Ten produkt nie istnieje albo nie jest aktualnie aktywny.</p>
              <a class="button" href="/#produkty">Wróć do produktów</a>
            </div>
          `;
          return;
        }

        document.title = `${product.title} - Rimtech Dynamics`;

        const productForCart = {
          slug: product.slug,
          title: product.title,
          price: product.price,
          currency: product.currency || 'PLN',
          image: product.main_image || '',
          quantity: 1
        };

        const productImage = product.main_image
          ? `<img class="product-page-image" src="${escapeHtml(product.main_image)}" alt="${escapeHtml(product.title)}">`
          : `<div class="product-page-image"></div>`;

        const compatibility = renderList(product.compatibility, 'model');
        const included = renderList(product.included, 'item');
        const hubColors = renderList(product.hub_colors, 'color');
        const rimColors = renderList(product.rim_colors, 'color');

        container.innerHTML = `
          <div class="product-page">
            <div class="product-page-gallery">
              ${productImage}
            </div>

            <div class="product-page-info">
              <div class="section-kicker">Rimtech Dynamics</div>

              ${product.badge ? `<div class="availability">${escapeHtml(product.badge)}</div>` : ''}

              <h1>${escapeHtml(product.title)}</h1>

              <p class="product-page-short">
                ${escapeHtml(product.short_description)}
              </p>

              <div class="product-page-price">
                ${formatPrice(product.price, product.currency)}
              </div>

              <div class="availability">
                ${escapeHtml(product.availability || 'Na zamówienie')}
              </div>

              <div class="product-page-actions">
                <button class="button" type="button" id="buy-now-button">Kup teraz</button>
                <button class="button secondary" type="button" id="add-to-cart-button">Dodaj do koszyka</button>
              </div>

              <p class="product-page-short">
                Produkt może wymagać potwierdzenia dopasowania pod konkretny model, rocznik i konfigurację motocykla.
              </p>
            </div>
          </div>

          <div class="product-page-extra">
            <div class="contact-card">
              <h2>Opis produktu</h2>
              ${renderDescription(product.description)}
            </div>

            <div class="contact-card">
              <h2>Kompatybilność</h2>
              ${compatibility || '<p>Skontaktuj się z nami w celu potwierdzenia dopasowania.</p>'}
            </div>
          </div>

          <div class="product-page-extra">
            <div class="contact-card">
              <h2>Co zawiera zestaw</h2>
              ${included || '<p>Zakres zestawu zostanie potwierdzony przed zakupem.</p>'}
            </div>

            <div class="contact-card">
              <h2>Konfiguracja</h2>

              <p><strong>Kolory piast:</strong></p>
              ${hubColors || '<p>Do ustalenia indywidualnie.</p>'}

              <p><strong>Kolory obręczy:</strong></p>
              ${rimColors || '<p>Do ustalenia indywidualnie.</p>'}
            </div>
          </div>

          <div class="product-page-extra">
            <div class="contact-card">
              <h2>Dostawa i płatność</h2>
              <p>Przed realizacją zamówienia potwierdzamy dopasowanie zestawu do motocykla oraz dostępność wybranej konfiguracji.</p>
              <p>Docelowo płatność zostanie obsłużona przez Przelewy24.</p>
              <p><a href="/legal.html?doc=dostawa-platnosci">Zobacz informacje o dostawie i płatności</a></p>
            </div>

            <div class="contact-card">
              <h2>Zwroty i reklamacje</h2>
              <p>Produkty wykonywane lub konfigurowane pod indywidualne zamówienie mogą mieć szczególne zasady zwrotu.</p>
              <p><a href="/legal.html?doc=zwroty-reklamacje">Zobacz zasady zwrotów i reklamacji</a></p>
            </div>
          </div>

          ${renderGallery(product)}
        `;

        const buyNowButton = document.getElementById('buy-now-button');
        const addToCartButton = document.getElementById('add-to-cart-button');

        buyNowButton.addEventListener('click', () => {
          addProductToCart(productForCart);
          window.location.href = '/cart.html';
        });

        addToCartButton.addEventListener('click', () => {
          addProductToCart(productForCart);
          addToCartButton.textContent = 'Dodano do koszyka';

          setTimeout(() => {
            addToCartButton.textContent = 'Dodaj do koszyka';
          }, 1600);
        });
      } catch (error) {
        console.error('Nie udało się załadować produktu:', error);
        container.innerHTML = `
          <div class="contact-card">
            <h2>Błąd ładowania produktu</h2>
            <p>Nie udało się załadować danych produktu. Spróbuj ponownie później.</p>
            <a class="button" href="/#produkty">Wróć do produktów</a>
          </div>
        `;
      }
    }

    loadProduct();
    updateCartCount();

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
